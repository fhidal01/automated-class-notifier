name: Daily Class Report

on:
  schedule:
    # 10 PM America/New_York can be 02:00 or 03:00 UTC depending on DST
    - cron: "0 2,3 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Gate to 10 PM New York time
        id: gate
        run: |
          EVENT_NAME="${{ github.event_name }}"
          ET_HOUR=$(TZ=America/New_York date +%H)
          ET_DATE=$(TZ=America/New_York date +%Y-%m-%d)
          ET_TIME=$(TZ=America/New_York date +%H:%M:%S)
          echo "et_date=${ET_DATE}" >> "$GITHUB_OUTPUT"
          echo "et_time=${ET_TIME}" >> "$GITHUB_OUTPUT"
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$ET_HOUR" = "22" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip note when not 10 PM ET
        if: steps.gate.outputs.should_run != 'true'
        run: |
          {
            echo "## Daily Class Report"
            echo ""
            echo "Skipped: current New York time is \`${{ steps.gate.outputs.et_time }}\`."
            echo "This workflow only runs the report at 10:00 PM America/New_York."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build report from last 24h checker runs
        if: steps.gate.outputs.should_run == 'true'
        id: build
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = 'check-class.yml';
            const sinceMs = Date.now() - 24 * 60 * 60 * 1000;
            const nyFormatter = new Intl.DateTimeFormat('en-US', {
              timeZone: 'America/New_York',
              year: 'numeric',
              month: 'short',
              day: '2-digit',
              hour: 'numeric',
              minute: '2-digit',
              second: '2-digit',
              hour12: true,
              timeZoneName: 'short'
            });
            const formatNy = (value) => nyFormatter.format(new Date(value));

            let page = 1;
            let all = [];
            while (true) {
              const resp = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                per_page: 100,
                page
              });
              const runs = resp.data.workflow_runs || [];
              all = all.concat(runs);
              if (runs.length < 100) break;
              page += 1;
            }

            const recent = all.filter((r) => new Date(r.run_started_at).getTime() >= sinceMs);
            const totals = {
              total: recent.length,
              success: 0,
              failure: 0,
              cancelled: 0,
              skipped: 0,
              timed_out: 0,
              neutral: 0,
              action_required: 0,
              in_progress: 0
            };

            for (const run of recent) {
              const key = run.conclusion || (run.status === 'completed' ? 'neutral' : 'in_progress');
              if (Object.prototype.hasOwnProperty.call(totals, key)) totals[key] += 1;
              else totals.neutral += 1;
            }

            const latest = recent.sort((a, b) => new Date(b.run_started_at) - new Date(a.run_started_at))[0];
            const latestText = latest
              ? `${latest.conclusion || latest.status} at ${formatNy(latest.run_started_at)}`
              : 'none';

            const report = [
              `Daily check report for ${formatNy(Date.now())}`,
              `Total runs (last 24h): ${totals.total}`,
              `Success: ${totals.success}`,
              `Failure: ${totals.failure}`,
              `Cancelled: ${totals.cancelled}`,
              `Timed out: ${totals.timed_out}`,
              `Skipped: ${totals.skipped}`,
              `In progress: ${totals.in_progress}`,
              `Latest run: ${latestText}`
            ].join('\n');

            core.setOutput('report', report);
            core.setOutput('total', String(totals.total));
            core.setOutput('success', String(totals.success));
            core.setOutput('failure', String(totals.failure));
            core.setOutput('latest', latestText);

      - name: Build class-status history from checker logs
        if: steps.gate.outputs.should_run == 'true'
        id: history
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SINCE_EPOCH=$(( $(date +%s) - 24 * 60 * 60 ))
          RUNS_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/check-class.yml/runs?per_page=100")"

          RECENT_RUNS="$(echo "$RUNS_JSON" | jq -r --argjson since "$SINCE_EPOCH" '
            .workflow_runs
            | map(select((.run_started_at | fromdateiso8601) >= $since))
            | sort_by(.run_started_at)
            | .[]
            | @base64
          ')"

          HISTORY_FILE="$(mktemp)"
          FULL_COUNT=0
          AVAILABLE_COUNT=0
          UNKNOWN_COUNT=0
          LATEST_STATUS="unknown"

          while IFS= read -r RUN_B64; do
            if [ -z "$RUN_B64" ]; then
              continue
            fi

            RUN_JSON="$(echo "$RUN_B64" | base64 --decode)"
            RUN_ID="$(echo "$RUN_JSON" | jq -r '.id')"
            RUN_STARTED_AT="$(echo "$RUN_JSON" | jq -r '.run_started_at')"
            RUN_CONCLUSION="$(echo "$RUN_JSON" | jq -r '.conclusion // .status')"
            RUN_URL="$(echo "$RUN_JSON" | jq -r '.html_url')"

            LOG_TEXT="$(gh run view "$RUN_ID" --repo "$GITHUB_REPOSITORY" --log 2>/dev/null || true)"
            CLASS_STATUS="$(printf '%s\n' "$LOG_TEXT" | sed -nE 's/^.*Status: ([^ ]+).*/\1/p' | tail -1 | tr '[:upper:]' '[:lower:]')"
            if [ -z "$CLASS_STATUS" ]; then
              CLASS_STATUS="unknown"
            fi
            LATEST_STATUS="$CLASS_STATUS"

            case "$CLASS_STATUS" in
              full) FULL_COUNT=$((FULL_COUNT + 1)) ;;
              available) AVAILABLE_COUNT=$((AVAILABLE_COUNT + 1)) ;;
              *) UNKNOWN_COUNT=$((UNKNOWN_COUNT + 1)) ;;
            esac

            RUN_STARTED_ET="$(TZ=America/New_York date -d "$RUN_STARTED_AT" '+%Y-%m-%d %I:%M:%S %p %Z' 2>/dev/null || echo "$RUN_STARTED_AT")"
            printf "| %s | %s | %s | [run](%s) |\n" "$RUN_STARTED_ET" "$CLASS_STATUS" "$RUN_CONCLUSION" "$RUN_URL" >> "$HISTORY_FILE"
          done <<< "$RECENT_RUNS"

          {
            echo "history_markdown<<EOF"
            if [ -s "$HISTORY_FILE" ]; then
              cat "$HISTORY_FILE"
            else
              echo "| none | unknown | n/a | n/a |"
            fi
            echo "EOF"
            echo "full_count=$FULL_COUNT"
            echo "available_count=$AVAILABLE_COUNT"
            echo "unknown_count=$UNKNOWN_COUNT"
            echo "latest_status=$LATEST_STATUS"
          } >> "$GITHUB_OUTPUT"

      - name: Write report summary
        if: steps.gate.outputs.should_run == 'true'
        run: |
          {
            echo "## Daily Class Report"
            echo ""
            echo "- Date (ET): \`${{ steps.gate.outputs.et_date }}\`"
            echo "- Time (ET): \`${{ steps.gate.outputs.et_time }}\`"
            echo "- Total runs (24h): \`${{ steps.build.outputs.total }}\`"
            echo "- Success: \`${{ steps.build.outputs.success }}\`"
            echo "- Failure: \`${{ steps.build.outputs.failure }}\`"
            echo "- Class status = full: \`${{ steps.history.outputs.full_count }}\`"
            echo "- Class status = available: \`${{ steps.history.outputs.available_count }}\`"
            echo "- Class status = unknown: \`${{ steps.history.outputs.unknown_count }}\`"
            echo "- Latest run: \`${{ steps.build.outputs.latest }}\`"
            echo ""
            echo "### Run History (Last 24h)"
            echo ""
            echo "| Checked At (ET) | Class Status | Run Conclusion | Link |"
            echo "|---|---|---|---|"
            echo "${{ steps.history.outputs.history_markdown }}"
            echo ""
            echo "### Raw"
            echo ""
            echo '```'
            echo "${{ steps.build.outputs.report }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Send daily report email (optional)
        if: steps.gate.outputs.should_run == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          TOTAL_RUNS: ${{ steps.build.outputs.total }}
          SUCCESS_RUNS: ${{ steps.build.outputs.success }}
          FAILURE_RUNS: ${{ steps.build.outputs.failure }}
          FULL_COUNT: ${{ steps.history.outputs.full_count }}
          AVAILABLE_COUNT: ${{ steps.history.outputs.available_count }}
          UNKNOWN_COUNT: ${{ steps.history.outputs.unknown_count }}
          LATEST_STATUS: ${{ steps.history.outputs.latest_status }}
          LATEST_RUN: ${{ steps.build.outputs.latest }}
        run: |
          if [ -z "$SMTP_HOST" ] || [ -z "$SMTP_PORT" ] || [ -z "$SMTP_FROM" ] || [ -z "$SMTP_TO" ]; then
            echo "Skipping email send: missing SMTP_HOST, SMTP_PORT, SMTP_FROM, or SMTP_TO."
            exit 0
          fi

          case "$LATEST_STATUS" in
            available) SUBJECT="Music class - Available" ;;
            full) SUBJECT="Music class - Full" ;;
            *) SUBJECT="Music class - Unknown" ;;
          esac

          BODY="Daily class report (last 24h):
Total runs: $TOTAL_RUNS
Success: $SUCCESS_RUNS
Failure: $FAILURE_RUNS
Class status full: $FULL_COUNT
Class status available: $AVAILABLE_COUNT
Class status unknown: $UNKNOWN_COUNT
Latest run: $LATEST_RUN

Workflow run: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          export SUBJECT BODY

          python3 - <<'PY'
import os
import smtplib
from email.message import EmailMessage

host = os.environ["SMTP_HOST"]
port = int(os.environ["SMTP_PORT"])
username = os.getenv("SMTP_USERNAME", "")
password = os.getenv("SMTP_PASSWORD", "")
secure = (os.getenv("SMTP_SECURE") or "starttls").lower()
from_addr = os.environ["SMTP_FROM"]
to_addrs = [x.strip() for x in os.environ["SMTP_TO"].split(",") if x.strip()]
subject = os.environ["SUBJECT"]
body = os.environ["BODY"]

msg = EmailMessage()
msg["Subject"] = subject
msg["From"] = from_addr
msg["To"] = ", ".join(to_addrs)
msg.set_content(body)

if secure == "ssl":
  server = smtplib.SMTP_SSL(host, port, timeout=30)
else:
  server = smtplib.SMTP(host, port, timeout=30)
  server.ehlo()
  if secure == "starttls":
    server.starttls()
    server.ehlo()

try:
  if username:
    server.login(username, password)
  server.send_message(msg)
finally:
  server.quit()
PY

      - name: Send daily report via Pushover (optional)
        if: steps.gate.outputs.should_run == 'true'
        env:
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_DEVICE: ${{ secrets.PUSHOVER_DEVICE }}
        run: |
          if [ -z "$PUSHOVER_APP_TOKEN" ] || [ -z "$PUSHOVER_USER_KEY" ]; then
            echo "Skipping Pushover send: missing PUSHOVER_APP_TOKEN or PUSHOVER_USER_KEY."
            exit 0
          fi
          MSG="Daily class report: total=${{ steps.build.outputs.total }}, success=${{ steps.build.outputs.success }}, failure=${{ steps.build.outputs.failure }}, full=${{ steps.history.outputs.full_count }}, available=${{ steps.history.outputs.available_count }}, unknown=${{ steps.history.outputs.unknown_count }}, latest=${{ steps.build.outputs.latest }}"
          if [ -n "$PUSHOVER_DEVICE" ]; then
            curl -sS \
              --form-string "token=$PUSHOVER_APP_TOKEN" \
              --form-string "user=$PUSHOVER_USER_KEY" \
              --form-string "device=$PUSHOVER_DEVICE" \
              --form-string "title=Daily Class Report" \
              --form-string "message=$MSG" \
              https://api.pushover.net/1/messages.json >/dev/null
          else
            curl -sS \
              --form-string "token=$PUSHOVER_APP_TOKEN" \
              --form-string "user=$PUSHOVER_USER_KEY" \
              --form-string "title=Daily Class Report" \
              --form-string "message=$MSG" \
              https://api.pushover.net/1/messages.json >/dev/null
          fi
